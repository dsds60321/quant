spring:
  application:
    name: quant
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quant}
    username: ${DB_USERNAME:kanggeonho}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: quant-hikari
      maximum-pool-size: 16
      minimum-idle: 4
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

logging:
  level:
    org.hibernate.SQL: info
    com.gh.quant.platform: info

platform:
  python-engine:
    base-url: ${PYTHON_ENGINE_BASE_URL:http://localhost:8000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  scheduler:
    rebalance-cron: ${REBALANCE_CRON:0 0/30 * * * *}

api:
  news:
    key: 